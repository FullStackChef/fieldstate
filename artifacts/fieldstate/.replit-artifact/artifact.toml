kind = "web"
previewPath = "/"
title = "FieldState"
version = "1.0.0"
id = "artifacts/fieldstate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20165

[services.development]
run = "pnpm --filter @workspace/fieldstate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fieldstate", "run", "build" ]
publicDir = "artifacts/fieldstate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20165"
BASE_PATH = "/"
