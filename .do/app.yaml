name: fieldstate-staging

ingress:
  rules:
    - component:
        name: api
      match:
        path:
          prefix: /api
    - component:
        name: fieldstate
      match:
        path:
          prefix: /

services:
  - name: api
    github:
      repo: FullStackChef/fieldstate
      branch: main
      deploy_on_push: true
    build_command: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    run_command: pnpm --filter @workspace/api-server run start
    http_port: 8080
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
        scope: RUN_TIME
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET

  - name: fieldstate
    github:
      repo: FullStackChef/fieldstate
      branch: main
      deploy_on_push: true
    build_command: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/fieldstate run build
    run_command: pnpm --filter @workspace/fieldstate run start
    http_port: 8080
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: BASE_PATH
        value: /
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
